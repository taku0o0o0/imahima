<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>imahima</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f5f5f0;
    --gray: #888;
    --light: #e8e8e2;
  }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--white);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 2rem 2rem 1rem;
    border-bottom: 2px solid var(--black);
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  .logo {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.05em;
  }

  .logo span { font-weight: 400; opacity: 0.4; font-size: 0.75rem; }

  .main {
    width: 100%;
    max-width: 480px;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 0.5rem;
  }

  input[type="text"] {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 2px solid var(--black);
    background: transparent;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 1rem;
    outline: none;
    transition: background 0.15s;
  }
  input[type="text"]:focus { background: var(--light); }

  .btn {
    padding: 0.75rem 1.5rem;
    border: 2px solid var(--black);
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .btn:hover { background: transparent; color: var(--black); }
  .btn.outline { background: transparent; color: var(--black); }
  .btn.outline:hover { background: var(--black); color: var(--white); }
  .btn.full { width: 100%; }
  .btn.danger { border-color: #c00; color: #c00; background: transparent; }
  .btn.danger:hover { background: #c00; color: var(--white); }

  /* SETUP */
  #setup-screen { display: flex; flex-direction: column; gap: 1.5rem; }

  /* APP */
  #app-screen { display: none; flex-direction: column; gap: 1.5rem; }

  .my-status-area {
    border: 2px solid var(--black);
    padding: 1.25rem;
  }

  .my-name-display {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    opacity: 0.5;
    margin-bottom: 1rem;
  }

  .status-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .status-btn {
    padding: 1.25rem 0.75rem;
    border: 2px solid var(--black);
    background: transparent;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }
  .status-btn .emoji { font-size: 1.5rem; }
  .status-btn .label { font-size: 0.65rem; font-family: 'Space Mono', monospace; letter-spacing: 0.05em; opacity: 0.6; }
  .status-btn:hover { background: var(--light); }
  .status-btn.active { background: var(--black); color: var(--white); }

  /* NOTIFICATION BANNER */
  #notif-banner {
    border: 2px solid var(--black);
    padding: 1rem;
    display: none;
    flex-direction: column;
    gap: 0.75rem;
  }
  .notif-banner-text {
    font-size: 0.85rem;
    line-height: 1.5;
  }
  .notif-banner-btns { display: flex; gap: 0.5rem; }

  /* NOTIF STATUS ROW */
  .notif-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--light);
  }
  .notif-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 0.2rem 0.5rem;
    border: 1px solid;
  }
  .notif-badge.on { border-color: var(--black); background: var(--black); color: var(--white); }
  .notif-badge.off { border-color: var(--gray); color: var(--gray); }

  /* INVITE */
  .invite-box {
    border: 2px solid var(--black);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .invite-url {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    word-break: break-all;
    opacity: 0.6;
    line-height: 1.5;
  }
  .copy-feedback {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    opacity: 0;
    transition: opacity 0.3s;
    text-align: center;
  }
  .copy-feedback.show { opacity: 1; }

  /* MEMBERS */
  .members-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .members-list { display: flex; flex-direction: column; gap: 0.5rem; }

  .member-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 0.75rem;
    border: 1px solid var(--light);
    border-left: 3px solid transparent;
    transition: border-color 0.3s;
  }
  .member-row.hima { border-left-color: var(--black); }
  .member-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--light); flex-shrink: 0;
    transition: background 0.3s;
  }
  .member-row.hima .member-dot { background: var(--black); }
  .member-name { font-size: 0.9rem; flex: 1; }
  .member-status-text { font-family: 'Space Mono', monospace; font-size: 0.65rem; opacity: 0.5; }
  .member-time { font-family: 'Space Mono', monospace; font-size: 0.6rem; opacity: 0.35; }
  .member-delete {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; opacity: 0.25; transition: opacity 0.15s; padding: 0 0.25rem;
    color: var(--black);
    display: none;
  }
  .member-row:hover .member-delete { opacity: 0.6; }

  /* EDIT MODE */
  .edit-mode .member-delete { display: block; }
  .edit-mode .member-row { border-left-color: transparent !important; }

  /* ADD MEMBER */
  .add-member-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }
  .add-member-row input { flex: 1; padding: 0.5rem 0.75rem; font-size: 0.85rem; border: 1px solid var(--black); background: transparent; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; outline: none; }
  .add-member-row input:focus { background: var(--light); }

  /* DIVIDER */
  .divider { height: 1px; background: var(--light); }

  /* EMPTY */
  .empty {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    opacity: 0.4;
    text-align: center;
    padding: 1.5rem;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--black); color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 0.75rem 1.25rem;
    transition: transform 0.3s ease;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .poll-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--black);
    animation: pulse 1.5s infinite;
    display: inline-block; margin-left: 6px; vertical-align: middle;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .edit-toggle {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    opacity: 0.5;
    background: none; border: none; color: var(--black);
    text-decoration: underline;
    text-transform: uppercase;
    padding: 0;
  }
  .edit-toggle:hover { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">imahima<span> / いまひま</span></div>
</header>

<div class="main">

  <!-- SETUP SCREEN -->
  <div id="setup-screen">
    <div>
      <div class="section-label">あなたの名前</div>
      <input type="text" id="name-input" placeholder="例：ゆか" maxlength="20" />
    </div>
    <div>
      <div class="section-label">グループコード（なければ新規作成）</div>
      <input type="text" id="group-input" placeholder="友達から教えてもらったコード" maxlength="12" style="text-transform:uppercase;" />
    </div>
    <button class="btn full" onclick="enterApp()">はじめる</button>
  </div>

  <!-- APP SCREEN -->
  <div id="app-screen">

    <!-- ステータスボタン -->
    <div class="my-status-area">
      <div class="my-name-display" id="my-name-display">—</div>
      <div class="status-btns">
        <button class="status-btn" id="btn-hima" onclick="setStatus('hima')">
          <span class="emoji">🙋</span>
          <span style="font-size:1rem;font-weight:700;">暇‼️</span>
          <span class="label">hima</span>
        </button>
        <button class="status-btn" id="btn-busy" onclick="setStatus('busy')">
          <span class="emoji">📚</span>
          <span style="font-size:1rem;font-weight:700;">勉強中‼️</span>
          <span class="label">busy</span>
        </button>
      </div>
    </div>

    <!-- 通知バナー -->
    <div id="notif-banner">
      <div class="notif-banner-text">🔔 友達のステータス変化をポップアップ通知で受け取る</div>
      <div class="notif-banner-btns">
        <button class="btn full" onclick="requestNotif()">通知を許可する</button>
        <button class="btn outline" style="padding:0.75rem 1rem;white-space:nowrap;" onclick="dismissBanner()">あとで</button>
      </div>
    </div>

    <!-- 通知ステータス行 -->
    <div class="notif-row" id="notif-row" style="display:none;">
      <span style="font-size:0.85rem;">ポップアップ通知</span>
      <span class="notif-badge off" id="notif-badge">OFF</span>
    </div>

    <!-- 招待リンク -->
    <div>
      <div class="section-label">グループ招待リンク <span class="poll-dot"></span></div>
      <div class="invite-box">
        <div class="invite-url" id="invite-url-display">—</div>
        <button class="btn outline full" onclick="copyInvite()">リンクをコピー</button>
        <div class="copy-feedback" id="copy-feedback">コピーしました！</div>
      </div>
    </div>

    <!-- メンバー -->
    <div>
      <div class="members-header">
        <div class="section-label" style="margin:0;">メンバー</div>
        <button class="edit-toggle" id="edit-toggle" onclick="toggleEdit()">編集</button>
      </div>

      <div class="members-list" id="members-list">
        <div class="empty">まだメンバーがいないよ</div>
      </div>

      <!-- メンバー追加 (編集モード) -->
      <div class="add-member-row" id="add-member-row" style="display:none;">
        <input type="text" id="add-name-input" placeholder="名前を追加" maxlength="20"
          onkeydown="if(event.key==='Enter')addMember()" />
        <button class="btn outline" style="padding:0.5rem 0.75rem;font-size:0.8rem;" onclick="addMember()">追加</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ログアウト -->
    <button class="btn danger full" onclick="logout()">グループを抜ける</button>

  </div>
</div>

<div id="toast"></div>

<script>
const STORAGE_KEY = 'imahima_v1';
let myName = '', groupCode = '', myStatus = null;
let pollTimer = null, editMode = false;

// ===== GROUP DATA =====
function getGroupData(code) {
  try { return JSON.parse(localStorage.getItem('imahima_group_' + code) || '{}'); } catch { return {}; }
}
function setGroupData(code, data) {
  localStorage.setItem('imahima_group_' + code, JSON.stringify(data));
}

// ===== ENTER =====
function enterApp() {
  const nameVal = document.getElementById('name-input').value.trim();
  const groupVal = document.getElementById('group-input').value.trim().toUpperCase();
  if (!nameVal) { showToast('名前を入力してね！'); return; }

  myName = nameVal;
  groupCode = groupVal || generateCode();
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ myName, groupCode }));

  registerMember();

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  document.getElementById('my-name-display').textContent = myName + ' としてログイン中';

  const inviteUrl = location.href.split('#')[0] + '#' + groupCode;
  document.getElementById('invite-url-display').textContent = inviteUrl;

  // Notification UI
  setupNotifUI();

  renderMembers();
  pollTimer = setInterval(() => { checkForUpdates(); renderMembers(); }, 2000);
}

function generateCode() {
  return Math.random().toString(36).substr(2, 6).toUpperCase();
}

function logout() {
  if (!confirm('グループを抜けますか？')) return;
  const data = getGroupData(groupCode);
  delete data[myName];
  setGroupData(groupCode, data);
  localStorage.removeItem(STORAGE_KEY);
  clearInterval(pollTimer);
  location.reload();
}

// ===== NOTIFICATION UI =====
function setupNotifUI() {
  if (!('Notification' in window)) return;

  const banner = document.getElementById('notif-banner');
  const row = document.getElementById('notif-row');

  if (Notification.permission === 'granted') {
    banner.style.display = 'none';
    row.style.display = 'flex';
    setNotifBadge(true);
  } else if (Notification.permission === 'denied') {
    row.style.display = 'flex';
    setNotifBadge(false);
  } else {
    // default — show banner
    const dismissed = localStorage.getItem('imahima_notif_dismissed');
    if (!dismissed) {
      banner.style.display = 'flex';
    } else {
      row.style.display = 'flex';
      setNotifBadge(false);
    }
  }
}

function dismissBanner() {
  document.getElementById('notif-banner').style.display = 'none';
  document.getElementById('notif-row').style.display = 'flex';
  setNotifBadge(false);
  localStorage.setItem('imahima_notif_dismissed', '1');
}

function requestNotif() {
  if (!('Notification' in window)) { showToast('このブラウザは通知非対応です'); return; }
  if (Notification.permission === 'denied') {
    showToast('ブラウザの設定から通知を許可してね');
    return;
  }
  Notification.requestPermission().then(perm => {
    document.getElementById('notif-banner').style.display = 'none';
    document.getElementById('notif-row').style.display = 'flex';
    if (perm === 'granted') {
      setNotifBadge(true);
      showToast('通知を許可しました！');
      const data = getGroupData(groupCode);
      Object.entries(data).forEach(([n,i]) => { lastSeenStatuses[n] = i.status; });
    } else {
      setNotifBadge(false);
      showToast('通知が拒否されました');
    }
  });
}

function setNotifBadge(on) {
  const badge = document.getElementById('notif-badge');
  badge.textContent = on ? 'ON' : 'OFF';
  badge.className = 'notif-badge ' + (on ? 'on' : 'off');
}

// ===== MEMBER MANAGEMENT =====
function registerMember() {
  const data = getGroupData(groupCode);
  if (!data[myName]) data[myName] = { status: null, updatedAt: Date.now() };
  setGroupData(groupCode, data);
}

function setStatus(status) {
  myStatus = status;
  const data = getGroupData(groupCode);
  data[myName] = { status, updatedAt: Date.now() };
  setGroupData(groupCode, data);

  document.getElementById('btn-hima').classList.toggle('active', status === 'hima');
  document.getElementById('btn-busy').classList.toggle('active', status === 'busy');

  showToast(status === 'hima' ? '暇！送信したよ🙋' : '勉強中！送信したよ📚');

  if (window.bc) window.bc.postMessage({ type: 'status', name: myName, status, group: groupCode });
  renderMembers();
}

// ===== EDIT MODE =====
function toggleEdit() {
  editMode = !editMode;
  document.getElementById('edit-toggle').textContent = editMode ? '完了' : '編集';
  document.getElementById('add-member-row').style.display = editMode ? 'flex' : 'none';
  renderMembers();
}

function addMember() {
  const input = document.getElementById('add-name-input');
  const name = input.value.trim();
  if (!name) return;
  if (name === myName) { showToast('自分の名前は追加できないよ'); return; }
  const data = getGroupData(groupCode);
  if (data[name]) { showToast('もう追加されてるよ'); return; }
  data[name] = { status: null, updatedAt: Date.now() };
  setGroupData(groupCode, data);
  input.value = '';
  renderMembers();
  showToast(name + ' を追加したよ！');
}

function deleteMember(name) {
  if (name === myName) { showToast('自分は削除できないよ'); return; }
  const data = getGroupData(groupCode);
  delete data[name];
  setGroupData(groupCode, data);
  renderMembers();
}

// ===== RENDER =====
let lastSeenStatuses = {};

function renderMembers() {
  const data = getGroupData(groupCode);
  const list = document.getElementById('members-list');
  const members = Object.entries(data).filter(([n]) => n !== myName);

  if (members.length === 0) {
    list.innerHTML = '<div class="empty">まだ誰もいないよ。友達にリンク送ってみよう！</div>';
    return;
  }

  members.sort(([,a],[,b]) => {
    if (a.status === 'hima' && b.status !== 'hima') return -1;
    if (b.status === 'hima' && a.status !== 'hima') return 1;
    return (b.updatedAt||0) - (a.updatedAt||0);
  });

  const editClass = editMode ? 'edit-mode' : '';

  list.innerHTML = members.map(([name, info]) => {
    const statusClass = info.status === 'hima' ? 'hima' : '';
    const statusText = info.status === 'hima' ? '暇‼️' : info.status === 'busy' ? '勉強中‼️' : '—';
    const timeAgo = info.updatedAt ? formatTime(info.updatedAt) : '';
    return `<div class="member-row ${statusClass} ${editClass}">
      <div class="member-dot"></div>
      <div class="member-name">${esc(name)}</div>
      <div class="member-status-text">${statusText}</div>
      <div class="member-time">${timeAgo}</div>
      <button class="member-delete" onclick="deleteMember('${esc(name)}')" title="削除">✕</button>
    </div>`;
  }).join('');
}

function formatTime(ts) {
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 60) return 'いま';
  if (d < 3600) return Math.floor(d/60) + '分前';
  return Math.floor(d/3600) + '時間前';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== CHANGE DETECTION =====
function checkForUpdates() {
  if (Notification.permission !== 'granted') return;
  const data = getGroupData(groupCode);
  Object.entries(data).forEach(([name, info]) => {
    if (name === myName) return;
    const prev = lastSeenStatuses[name];
    if (prev !== undefined && prev !== info.status && info.status) {
      const msg = info.status === 'hima' ? `${name} が暇になったよ！🙋` : `${name} が勉強中になったよ📚`;
      pushNotif('imahima', msg);
    }
    lastSeenStatuses[name] = info.status;
  });
}

function pushNotif(title, body) {
  try { new Notification(title, { body }); } catch(e) {}
}

// ===== BROADCAST =====
if ('BroadcastChannel' in window) {
  window.bc = new BroadcastChannel('imahima');
  window.bc.onmessage = (e) => {
    if (e.data?.type === 'status' && e.data.group === groupCode && e.data.name !== myName) {
      const prev = lastSeenStatuses[e.data.name];
      if (prev !== e.data.status && e.data.status) {
        pushNotif('imahima', e.data.status === 'hima' ? `${e.data.name} が暇になったよ！🙋` : `${e.data.name} が勉強中になったよ📚`);
        lastSeenStatuses[e.data.name] = e.data.status;
      }
      renderMembers();
    }
  };
}

// ===== INVITE =====
function copyInvite() {
  const url = location.href.split('#')[0] + '#' + groupCode;
  navigator.clipboard.writeText(url).then(() => {
    const el = document.getElementById('copy-feedback');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }).catch(() => showToast('コピーできませんでした'));
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== INIT =====
window.addEventListener('load', () => {
  const hash = location.hash.slice(1).toUpperCase();
  if (hash) document.getElementById('group-input').value = hash;
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved?.myName) {
      document.getElementById('name-input').value = saved.myName;
      if (saved.groupCode && !hash) document.getElementById('group-input').value = saved.groupCode;
    }
  } catch {}
});

window.addEventListener('visibilitychange', () => {
  if (document.hidden) { clearInterval(pollTimer); pollTimer = null; }
  else if (groupCode) { renderMembers(); pollTimer = setInterval(() => { checkForUpdates(); renderMembers(); }, 2000); }
});
</script>
</body>
</html>
