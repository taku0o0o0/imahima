<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>imahima</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f5f5f0;
    --gray: #888;
    --light: #e8e8e2;
    --accent: #0a0a0a;
    --hima-color: #0a0a0a;
    --busy-color: #888;
  }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--white);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 2rem 2rem 1rem;
    border-bottom: 2px solid var(--black);
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.05em;
  }

  .logo span { font-weight: 400; opacity: 0.4; font-size: 0.75rem; }

  .main {
    width: 100%;
    max-width: 480px;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  /* SETUP SCREEN */
  #setup-screen { display: flex; flex-direction: column; gap: 1.5rem; }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 0.5rem;
  }

  input[type="text"] {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 2px solid var(--black);
    background: transparent;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 1rem;
    outline: none;
    transition: background 0.15s;
  }

  input[type="text"]:focus { background: var(--light); }

  .btn {
    padding: 0.75rem 1.5rem;
    border: 2px solid var(--black);
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .btn:hover { background: transparent; color: var(--black); }

  .btn.outline {
    background: transparent;
    color: var(--black);
  }

  .btn.outline:hover { background: var(--black); color: var(--white); }

  .btn.full { width: 100%; }

  /* INVITE AREA */
  .invite-box {
    border: 2px solid var(--black);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .invite-url {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    word-break: break-all;
    opacity: 0.6;
    line-height: 1.5;
  }

  /* APP SCREEN */
  #app-screen { display: none; flex-direction: column; gap: 1.5rem; }

  .my-status-area {
    border: 2px solid var(--black);
    padding: 1.25rem;
  }

  .my-name-display {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    opacity: 0.5;
    margin-bottom: 1rem;
  }

  .status-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .status-btn {
    padding: 1.25rem 0.75rem;
    border: 2px solid var(--black);
    background: transparent;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }

  .status-btn .emoji { font-size: 1.5rem; }
  .status-btn .label { font-size: 0.7rem; font-family: 'Space Mono', monospace; letter-spacing: 0.05em; opacity: 0.6; }

  .status-btn:hover { background: var(--light); }
  .status-btn.active-hima { background: var(--black); color: var(--white); }
  .status-btn.active-busy { background: var(--black); color: var(--white); }

  /* MEMBERS */
  .members-list { display: flex; flex-direction: column; gap: 0.5rem; }

  .member-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--light);
    border-left: 3px solid transparent;
    transition: border-color 0.3s;
  }

  .member-row.hima { border-left-color: var(--black); }
  .member-row.busy { border-left-color: var(--light); }

  .member-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--light);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .member-row.hima .member-dot { background: var(--black); }

  .member-name {
    font-size: 0.9rem;
    font-weight: 400;
    flex: 1;
  }

  .member-status-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    opacity: 0.5;
  }

  .member-time {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    opacity: 0.35;
  }

  /* NOTIFICATION BELL */
  .notif-status {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    opacity: 0.5;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
  }

  .notif-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gray); }
  .notif-dot.on { background: var(--black); }

  /* COPY FEEDBACK */
  .copy-feedback {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    opacity: 0;
    transition: opacity 0.3s;
    text-align: center;
  }
  .copy-feedback.show { opacity: 1; }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: var(--light);
  }

  /* EMPTY STATE */
  .empty {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    opacity: 0.4;
    text-align: center;
    padding: 1.5rem;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 0.75rem 1.25rem;
    transition: transform 0.3s ease;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* POLL indicator */
  .poll-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--black);
    animation: pulse 1.5s infinite;
    display: inline-block;
    margin-left: 6px;
    vertical-align: middle;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
</style>
</head>
<body>

<header>
  <div class="logo">imahima<span> / いまひま</span></div>
</header>

<div class="main">

  <!-- SETUP SCREEN -->
  <div id="setup-screen">
    <div>
      <div class="section-label">あなたの名前</div>
      <input type="text" id="name-input" placeholder="例：ゆか" maxlength="20" />
    </div>

    <div>
      <div class="section-label">グループコード（なければ新規作成）</div>
      <input type="text" id="group-input" placeholder="友達から教えてもらったコード" maxlength="12" style="text-transform:uppercase;" />
    </div>

    <button class="btn full" onclick="enterApp()">はじめる</button>

    <div id="notif-request" style="display:none;">
      <div class="divider"></div>
      <div style="display:flex;align-items:center;gap:1rem;padding-top:0.5rem;">
        <div class="section-label" style="margin:0;">通知を受け取る</div>
        <button class="btn outline" style="padding:0.4rem 0.75rem;font-size:0.7rem;" onclick="requestNotif()">許可する</button>
      </div>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="app-screen">
    <div class="my-status-area">
      <div class="my-name-display" id="my-name-display">—</div>
      <div class="status-btns">
        <button class="status-btn" id="btn-hima" onclick="setStatus('hima')">
          <span class="emoji">🙋</span>
          <span style="font-size:1rem;font-weight:700;">暇‼️</span>
          <span class="label">hima</span>
        </button>
        <button class="status-btn" id="btn-busy" onclick="setStatus('busy')">
          <span class="emoji">📚</span>
          <span style="font-size:1rem;font-weight:700;">勉強中‼️</span>
          <span class="label">busy</span>
        </button>
      </div>
    </div>

    <div>
      <div class="section-label">グループ招待リンク <span class="poll-dot"></span></div>
      <div class="invite-box">
        <div class="invite-url" id="invite-url-display">—</div>
        <button class="btn outline full" onclick="copyInvite()">リンクをコピー</button>
        <div class="copy-feedback" id="copy-feedback">コピーしました！</div>
      </div>
    </div>

    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
        <div class="section-label" style="margin:0;">メンバー</div>
        <div class="notif-status" onclick="requestNotif()" id="notif-indicator">
          <div class="notif-dot" id="notif-dot"></div>
          <span id="notif-label">通知オフ</span>
        </div>
      </div>
      <div class="members-list" id="members-list">
        <div class="empty">まだメンバーがいません</div>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ====== STATE ======
const STORAGE_KEY = 'imahima_v1';
let myName = '';
let groupCode = '';
let myStatus = null;
let pollTimer = null;

// ====== STORAGE (localStorage as shared bus within same origin/tab) ======
// Since this is a single HTML file with no server, we use localStorage to share state
// between tabs open on the same device. For cross-device sharing, user shares the URL
// with groupCode as hash — each device uses localStorage keyed by group.

function getGroupData(code) {
  try { return JSON.parse(localStorage.getItem('imahima_group_' + code) || '{}'); } catch { return {}; }
}

function setGroupData(code, data) {
  localStorage.setItem('imahima_group_' + code, JSON.stringify(data));
}

function myKey() { return myName + '_' + Date.now(); }

// ====== ENTER APP ======
function enterApp() {
  const nameVal = document.getElementById('name-input').value.trim();
  const groupVal = document.getElementById('group-input').value.trim().toUpperCase();

  if (!nameVal) { showToast('名前を入力してね！'); return; }

  myName = nameVal;
  groupCode = groupVal || generateCode();

  // Save session
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ myName, groupCode }));

  // Register in group
  registerMember();

  // Show app
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  document.getElementById('my-name-display').textContent = myName + ' としてログイン中';

  // Invite URL
  const inviteUrl = location.href.split('#')[0] + '#' + groupCode;
  document.getElementById('invite-url-display').textContent = inviteUrl;

  // Check notification permission
  if ('Notification' in window) {
    if (Notification.permission === 'granted') {
      setNotifIndicator(true);
    } else if (Notification.permission !== 'denied') {
      document.getElementById('notif-request').style.display = 'block';
    }
  }

  // Start polling
  renderMembers();
  pollTimer = setInterval(() => {
    checkForUpdates();
    renderMembers();
  }, 2000);
}

function generateCode() {
  return Math.random().toString(36).substr(2, 6).toUpperCase();
}

// ====== MEMBER MANAGEMENT ======
function registerMember() {
  const data = getGroupData(groupCode);
  data[myName] = { status: null, updatedAt: Date.now() };
  setGroupData(groupCode, data);
}

function setStatus(status) {
  myStatus = status;
  const data = getGroupData(groupCode);
  const prev = data[myName] ? data[myName].status : null;
  data[myName] = { status, updatedAt: Date.now() };
  setGroupData(groupCode, data);

  // Update buttons
  document.getElementById('btn-hima').classList.toggle('active-hima', status === 'hima');
  document.getElementById('btn-busy').classList.toggle('active-busy', status === 'busy');

  const msg = status === 'hima' ? '暇！送信したよ🙋' : '勉強中！送信したよ📚';
  showToast(msg);

  // Notify others in same browser (BroadcastChannel)
  if (window.bc) {
    window.bc.postMessage({ type: 'status', name: myName, status, group: groupCode });
  }

  renderMembers();
}

// ====== RENDER ======
let lastSeenStatuses = {};

function renderMembers() {
  const data = getGroupData(groupCode);
  const list = document.getElementById('members-list');
  const members = Object.entries(data).filter(([n]) => n !== myName);

  if (members.length === 0) {
    list.innerHTML = '<div class="empty">まだ誰もいないよ。友達にリンク送ってみよう！</div>';
    return;
  }

  // Sort: hima first, then by time
  members.sort(([,a],[,b]) => {
    if (a.status === 'hima' && b.status !== 'hima') return -1;
    if (b.status === 'hima' && a.status !== 'hima') return 1;
    return (b.updatedAt||0) - (a.updatedAt||0);
  });

  list.innerHTML = members.map(([name, info]) => {
    const statusClass = info.status === 'hima' ? 'hima' : info.status === 'busy' ? 'busy' : '';
    const statusText = info.status === 'hima' ? '暇‼️' : info.status === 'busy' ? '勉強中‼️' : '—';
    const timeAgo = info.updatedAt ? formatTime(info.updatedAt) : '';
    return `<div class="member-row ${statusClass}">
      <div class="member-dot"></div>
      <div class="member-name">${escHtml(name)}</div>
      <div class="member-status-text">${statusText}</div>
      <div class="member-time">${timeAgo}</div>
    </div>`;
  }).join('');
}

function formatTime(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'いま';
  if (diff < 3600) return Math.floor(diff/60) + '分前';
  return Math.floor(diff/3600) + '時間前';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ====== CHANGE DETECTION & NOTIFICATIONS ======
function checkForUpdates() {
  if (Notification.permission !== 'granted') return;
  const data = getGroupData(groupCode);

  Object.entries(data).forEach(([name, info]) => {
    if (name === myName) return;
    const prev = lastSeenStatuses[name];
    if (prev !== undefined && prev !== info.status && info.status) {
      const msg = info.status === 'hima' ? `${name} が暇になったよ！🙋` : `${name} が勉強中になったよ📚`;
      sendNotification('imahima', msg);
    }
    lastSeenStatuses[name] = info.status;
  });
}

function sendNotification(title, body) {
  if (Notification.permission !== 'granted') return;
  try {
    new Notification(title, { body, icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" fill="%230a0a0a"/><text x="16" y="22" text-anchor="middle" font-size="16" fill="white">ひ</text></svg>' });
  } catch(e) {}
}

// ====== NOTIFICATION PERMISSION ======
function requestNotif() {
  if (!('Notification' in window)) { showToast('このブラウザは通知非対応です'); return; }
  Notification.requestPermission().then(perm => {
    if (perm === 'granted') {
      setNotifIndicator(true);
      showToast('通知を許可しました！');
      document.getElementById('notif-request').style.display = 'none';
      // Init baseline
      const data = getGroupData(groupCode);
      Object.entries(data).forEach(([n,i]) => { lastSeenStatuses[n] = i.status; });
    } else {
      showToast('通知が拒否されています。ブラウザ設定から許可してね');
    }
  });
}

function setNotifIndicator(on) {
  document.getElementById('notif-dot').classList.toggle('on', on);
  document.getElementById('notif-label').textContent = on ? '通知オン' : '通知オフ';
}

// ====== BROADCAST CHANNEL (same-origin tabs) ======
if ('BroadcastChannel' in window) {
  window.bc = new BroadcastChannel('imahima');
  window.bc.onmessage = (e) => {
    if (e.data && e.data.type === 'status' && e.data.group === groupCode && e.data.name !== myName) {
      // Another tab updated — trigger notification
      const prev = lastSeenStatuses[e.data.name];
      if (prev !== e.data.status && e.data.status) {
        const msg = e.data.status === 'hima' ? `${e.data.name} が暇になったよ！🙋` : `${e.data.name} が勉強中になったよ📚`;
        sendNotification('imahima', msg);
        lastSeenStatuses[e.data.name] = e.data.status;
      }
      renderMembers();
    }
  };
}

// ====== INVITE ======
function copyInvite() {
  const url = location.href.split('#')[0] + '#' + groupCode;
  navigator.clipboard.writeText(url).then(() => {
    const el = document.getElementById('copy-feedback');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }).catch(() => showToast('コピーできませんでした'));
}

// ====== TOAST ======
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ====== INIT ======
window.addEventListener('load', () => {
  // Check for group code in URL hash
  const hash = location.hash.slice(1).toUpperCase();
  if (hash) document.getElementById('group-input').value = hash;

  // Restore session
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved && saved.myName) {
      document.getElementById('name-input').value = saved.myName;
      if (saved.groupCode && !hash) document.getElementById('group-input').value = saved.groupCode;
    }
  } catch {}
});

// Cleanup on page hide
window.addEventListener('visibilitychange', () => {
  if (document.hidden && pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  } else if (!document.hidden && groupCode) {
    renderMembers();
    pollTimer = setInterval(() => { checkForUpdates(); renderMembers(); }, 2000);
  }
});
</script>
</body>
</html>
